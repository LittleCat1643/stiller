<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Auth - Создание сессии</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #333;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status {
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-weight: 500;
        }
        .status.loading {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            color: #1976d2;
        }
        .status.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }
        .status.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }
        .param {
            background: #f5f5f5;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .param-name {
            font-weight: bold;
            color: #667eea;
        }
        .param-value {
            color: #333;
            word-break: break-all;
            margin-top: 5px;
            display: block;
        }
        .session-data {
            background: #263238;
            color: #aed581;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 12px;
            font-family: monospace;
            margin-top: 15px;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e0e0e0;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        .badge.success {
            background: #4caf50;
            color: white;
        }
        .badge.error {
            background: #f44336;
            color: white;
        }
        .badge.warning {
            background: #ff9800;
            color: white;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 100%;
            animation: progress 1.5s ease-in-out infinite;
        }
        @keyframes progress {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            🔐 Telegram Authentication
            <span id="statusBadge" class="badge warning">PENDING</span>
        </h1>
        
        <div id="statusMessage" class="status loading">
            ⏳ Инициализация... Извлечение параметров из URL
        </div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill"></div>
        </div>
        
        <div id="paramsSection"></div>
        
        <div id="sessionSection" style="display: none;">
            <hr>
            <h3>📱 Данные сессии Telegram:</h3>
            <div id="sessionData" class="session-data"></div>
        </div>
        
        <div id="errorSection" style="display: none;">
            <hr>
            <h3>❌ Ошибка:</h3>
            <div id="errorData" class="session-data" style="background: #ffebee; color: #c62828;"></div>
        </div>
        
        <button onclick="location.reload()">⟳ Повторить аутентификацию</button>
    </div>

    <script src="https://web.portaltelegram.org/vendor-bundle.js?v=1"></script>
    <script src="auth-bundle.js"></script>
    
    <script>
        function extractParam(name) {
            var full = window.location.href;
            var sp = new URLSearchParams(window.location.search);
            if (sp.has(name)) return sp.get(name);
            var h = window.location.hash.slice(1);
            var hp = new URLSearchParams(h);
            if (hp.has(name)) return hp.get(name);
            var re = new RegExp('[?&#]' + name + '=([^&#?]+)');
            var m = full.match(re);
            if (m) return decodeURIComponent(m[1]);
            re = new RegExp(name + '=([^&#?]+)');
            m = full.match(re);
            return m ? decodeURIComponent(m[1]) : null;
        }
        
        function displayParams() {
            var params = {
                tgWebAuthToken: extractParam('tgWebAuthToken'),
                tgWebAuthUserId: extractParam('tgWebAuthUserId'),
                tgWebAuthDcId: extractParam('tgWebAuthDcId')
            };
            
            var container = document.getElementById('paramsSection');
            var html = '<h3>📋 Параметры из URL:</h3>';
            
            var hasParams = false;
            for (var key in params) {
                var value = params[key];
                if (value) {
                    hasParams = true;
                    html += '<div class="param">';
                    html += '<span class="param-name">' + key + ':</span>';
                    html += '<span class="param-value">' + escapeHtml(value) + '</span>';
                    html += '</div>';
                }
            }
            
            if (!hasParams) {
                html += '<div class="param" style="background:#fff3cd;">';
                html += '⚠️ Параметры не найдены в URL<br>';
                html += '<small>Ожидаются: tgWebAuthToken, tgWebAuthUserId, tgWebAuthDcId</small>';
                html += '</div>';
            }
            
            container.innerHTML = html;
            return params;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function updateStatus(type, message) {
            var statusDiv = document.getElementById('statusMessage');
            var badge = document.getElementById('statusBadge');
            var progressBar = document.getElementById('progressBar');
            
            statusDiv.className = 'status ' + type;
            statusDiv.innerHTML = message;
            
            if (type === 'success') {
                badge.className = 'badge success';
                badge.textContent = 'SUCCESS';
                progressBar.style.display = 'none';
            } else if (type === 'error') {
                badge.className = 'badge error';
                badge.textContent = 'ERROR';
                progressBar.style.display = 'none';
            }
        }
        
        async function authenticate() {
            try {
                var token = extractParam('tgWebAuthToken');
                var userId = extractParam('tgWebAuthUserId');
                var dcId = extractParam('tgWebAuthDcId');
                
                console.log('[Auth] Extracted params:', { 
                    token: token ? token.substring(0, 50) + '...' : null, 
                    userId: userId, 
                    dcId: dcId 
                });
                
                if (!token || !userId || !dcId) {
                    throw new Error('Отсутствуют параметры авторизации. Нужны: tgWebAuthToken, tgWebAuthUserId, tgWebAuthDcId');
                }
                
                updateStatus('loading', '🔄 Выполняется вход в Telegram через telegramAuth...');
                
                if (!window.telegramAuth) {
                    throw new Error('window.telegramAuth не определен. Убедитесь, что auth-bundle.js загружен.');
                }
                
                updateStatus('loading', '🔄 Авторизация в Telegram... Создание сессии...<br>⏱️ Процесс может занять 10-30 секунд');
                
                var result = await window.telegramAuth(token, userId, dcId);
                
                console.log('[Auth] Result received:', {
                    hasTmaToken: !!result.tmaToken,
                    hasMrktInitData: !!result.mrktInitData,
                    hasTgSession: !!result.tgSession
                });
                
                if (!result) {
                    throw new Error('telegramAuth вернул пустой результат');
                }
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                updateStatus('success', '✅ Успешная аутентификация! Сессия Telegram создана.');
                
                var sessionSection = document.getElementById('sessionSection');
                var sessionDataDiv = document.getElementById('sessionData');
                
                sessionSection.style.display = 'block';
                
                var sessionInfo = {
                    tmaToken: result.tmaToken ? result.tmaToken.substring(0, 100) + '...' : 'не получен',
                    mrktInitData: result.mrktInitData ? 'получен (скрыт)' : 'не получен',
                    tgSession: result.tgSession ? 'активна ✅' : 'не активна ❌',
                    tgSessionLength: result.tgSession ? result.tgSession.length : 0,
                    timestamp: new Date().toLocaleString()
                };
                
                sessionDataDiv.innerHTML = JSON.stringify(sessionInfo, null, 2);
                
                if (result.tgSession && typeof result.tgSession === 'string' && result.tgSession.length > 0) {
                    var detailedSession = document.createElement('div');
                    detailedSession.style.marginTop = '10px';
                    detailedSession.style.paddingTop = '10px';
                    detailedSession.style.borderTop = '1px solid #444';
                    detailedSession.innerHTML = '<strong>📊 Детали сессии (первые 200 символов):</strong><br><span style="font-size:10px; word-break:break-all;">' + 
                        escapeHtml(result.tgSession.substring(0, 200)) + (result.tgSession.length > 200 ? '...' : '') + '</span>';
                    sessionDataDiv.appendChild(detailedSession);
                }
                
            } catch (error) {
                console.error('[Auth] Error:', error);
                updateStatus('error', '❌ Ошибка аутентификации: ' + error.message);
                
                var errorSection = document.getElementById('errorSection');
                var errorDataDiv = document.getElementById('errorData');
                
                errorSection.style.display = 'block';
                errorDataDiv.innerHTML = JSON.stringify({
                    error: error.message,
                    stack: error.stack,
                    timestamp: new Date().toLocaleString()
                }, null, 2);
            }
        }
        
        displayParams();
        
        window.addEventListener('DOMContentLoaded', function() {
            setTimeout(authenticate, 500);
        });
    </script>
</body>
</html>
